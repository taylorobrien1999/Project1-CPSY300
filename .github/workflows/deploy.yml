name: CI/CD Pipeline - Diet Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas matplotlib seaborn azure-storage-blob

      - name: Run Python syntax check
        run: |
          python -m py_compile data_analysis.py
          python -m py_compile lambda_function.py
          echo "Syntax check passed"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t taymar24/diet-analysis:latest .

      - name: Push Docker image to Docker Hub
        run: |
          docker push taymar24/diet-analysis:latest

      - name: Simulate deployment
        run: |
          echo "Simulated deployment complete — image available at docker.io/taymar24/diet-analysis:latest"